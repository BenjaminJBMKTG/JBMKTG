<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Ads Structure for Ecom | Interactive Flowchart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0e27;
            overflow: hidden;
            cursor: grab;
        }

        body.grabbing {
            cursor: grabbing;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #flowchart {
            position: absolute;
            transform-origin: 0 0;
            transition: transform 0.3s ease;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .control-btn {
            background: rgba(99, 102, 241, 0.9);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .control-btn:hover {
            background: rgba(99, 102, 241, 1);
            transform: scale(1.1);
        }

        .reset-btn {
            background: rgba(239, 68, 68, 0.9);
        }

        .reset-btn:hover {
            background: rgba(239, 68, 68, 1);
        }

        /* Flowchart Elements */
        .node {
            background: rgba(30, 41, 59, 0.95);
            border-radius: 16px;
            padding: 30px;
            border: 3px solid;
            color: #e2e8f0;
            min-width: 350px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .node-header {
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .node-title {
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .node-subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
            font-style: italic;
        }

        .node-budget {
            font-size: 24px;
            font-weight: 800;
            margin-top: 10px;
        }

        .campaign {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid;
        }

        .campaign-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .campaign-percent {
            background: rgba(99, 102, 241, 0.3);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 800;
        }

        .campaign-items {
            list-style: none;
            margin-top: 12px;
        }

        .campaign-items li {
            font-size: 14px;
            padding: 6px 0;
            padding-left: 20px;
            position: relative;
            opacity: 0.9;
        }

        .campaign-items li:before {
            content: '→';
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        .examples {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
        }

        .examples-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-bottom: 12px;
        }

        .examples-list {
            list-style: none;
        }

        .examples-list li {
            font-size: 13px;
            padding: 5px 0;
            opacity: 0.7;
            font-style: italic;
            padding-left: 20px;
            position: relative;
        }

        .examples-list li:before {
            content: '"';
            position: absolute;
            left: 0;
            font-size: 20px;
            opacity: 0.5;
        }

        /* Colors */
        .top-funnel {
            border-color: #ef4444;
        }

        .top-funnel .node-header {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(239, 68, 68, 0.05) 100%);
        }

        .top-funnel .node-title {
            color: #fca5a5;
        }

        .top-funnel .campaign {
            border-left-color: #ef4444;
        }

        .middle-funnel {
            border-color: #f59e0b;
        }

        .middle-funnel .node-header {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2) 0%, rgba(245, 158, 11, 0.05) 100%);
        }

        .middle-funnel .node-title {
            color: #fcd34d;
        }

        .middle-funnel .campaign {
            border-left-color: #f59e0b;
        }

        .bottom-funnel {
            border-color: #10b981;
        }

        .bottom-funnel .node-header {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(16, 185, 129, 0.05) 100%);
        }

        .bottom-funnel .node-title {
            color: #6ee7b7;
        }

        .bottom-funnel .campaign {
            border-left-color: #10b981;
        }

        /* Connector lines */
        .connector {
            position: absolute;
            background: rgba(99, 102, 241, 0.3);
            height: 3px;
            z-index: -1;
        }

        .connector-arrow {
            position: absolute;
            right: -8px;
            top: -5px;
            width: 0;
            height: 0;
            border-left: 8px solid rgba(99, 102, 241, 0.3);
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
        }

        /* Header */
        .chart-header {
            background: rgba(30, 41, 59, 0.95);
            border: 3px solid #6366f1;
            border-radius: 20px;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .chart-title {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .chart-subtitle {
            font-size: 20px;
            color: #94a3b8;
            font-weight: 500;
        }

        /* Info box */
        .info-box {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(30, 41, 59, 0.95);
            border: 2px solid #6366f1;
            border-radius: 12px;
            padding: 20px;
            color: #e2e8f0;
            font-size: 14px;
            z-index: 1000;
            max-width: 250px;
        }

        .info-box h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #a5b4fc;
        }

        .info-box p {
            margin: 5px 0;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="info-box">
        <h3>🎥 Presentation Controls</h3>
        <p><strong>Drag:</strong> Pan around</p>
        <p><strong>Scroll:</strong> Zoom in/out</p>
        <p><strong>+/-:</strong> Zoom buttons</p>
        <p><strong>⟲:</strong> Reset view</p>
    </div>

    <div id="canvas-container">
        <div id="flowchart">
            <!-- Chart will be built by JavaScript -->
        </div>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="zoomIn()">+</button>
        <button class="control-btn" onclick="zoomOut()">−</button>
        <button class="control-btn reset-btn" onclick="resetView()">⟲</button>
    </div>

    <script>
        const flowchart = document.getElementById('flowchart');
        const container = document.getElementById('canvas-container');
        
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX = 0;
        let startY = 0;

        // Build flowchart structure
        function buildFlowchart() {
            const structure = `
                <div style="padding: 100px; display: flex; flex-direction: column; gap: 150px;">
                    <!-- Header -->
                    <div style="display: flex; justify-content: center;">
                        <div class="chart-header">
                            <div class="chart-title">Google Ads Structure</div>
                            <div class="chart-subtitle">Full-Funnel Framework for Ecom Brands</div>
                        </div>
                    </div>

                    <!-- Funnel Nodes -->
                    <div style="display: flex; gap: 200px; justify-content: center;">
                        <!-- Top of Funnel -->
                        <div class="node top-funnel">
                            <div class="node-header">
                                <div class="node-title">Top of Funnel</div>
                                <div class="node-subtitle">Problem Aware</div>
                                <div class="node-budget">25% Budget</div>
                            </div>

                            <div class="campaign">
                                <div class="campaign-name">
                                    Performance Max (Discovery)
                                    <span class="campaign-percent">~15%</span>
                                </div>
                                <ul class="campaign-items">
                                    <li>YouTube placements</li>
                                    <li>Display Network</li>
                                    <li>Gmail ads</li>
                                </ul>
                            </div>

                            <div class="campaign">
                                <div class="campaign-name">
                                    Dynamic Search Ads
                                    <span class="campaign-percent">~10%</span>
                                </div>
                                <ul class="campaign-items">
                                    <li>Auto-targets from site</li>
                                    <li>Catch long-tail searches</li>
                                </ul>
                            </div>

                            <div class="examples">
                                <div class="examples-title">Example Searches</div>
                                <ul class="examples-list">
                                    <li>How to fix dry skin</li>
                                    <li>Solutions for cold emails</li>
                                    <li>Best way to track inventory</li>
                                </ul>
                            </div>
                        </div>

                        <!-- Middle of Funnel -->
                        <div class="node middle-funnel">
                            <div class="node-header">
                                <div class="node-title">Middle of Funnel</div>
                                <div class="node-subtitle">Solution Aware</div>
                                <div class="node-budget">50% Budget</div>
                            </div>

                            <div class="campaign">
                                <div class="campaign-name">
                                    Generic Search
                                    <span class="campaign-percent">~25%</span>
                                </div>
                                <ul class="campaign-items">
                                    <li>[Product Category] keywords</li>
                                    <li>[Feature] keywords</li>
                                    <li>Exact & phrase match</li>
                                </ul>
                            </div>

                            <div class="campaign">
                                <div class="campaign-name">
                                    High Priority Shopping
                                    <span class="campaign-percent">~15%</span>
                                </div>
                                <ul class="campaign-items">
                                    <li>All products feed</li>
                                    <li>Broad discovery</li>
                                </ul>
                            </div>

                            <div class="campaign">
                                <div class="campaign-name">
                                    Competitor Campaigns
                                    <span class="campaign-percent">~10%</span>
                                </div>
                                <ul class="campaign-items">
                                    <li>[Competitor] alternative</li>
                                    <li>vs [Competitor]</li>
                                </ul>
                            </div>

                            <div class="examples">
                                <div class="examples-title">Example Searches</div>
                                <ul class="examples-list">
                                    <li>Best running shoes for marathon</li>
                                    <li>CRM software for small business</li>
                                    <li>Nike alternative trainers</li>
                                </ul>
                            </div>
                        </div>

                        <!-- Bottom of Funnel -->
                        <div class="node bottom-funnel">
                            <div class="node-header">
                                <div class="node-title">Bottom of Funnel</div>
                                <div class="node-subtitle">Product Aware</div>
                                <div class="node-budget">35% Budget</div>
                            </div>

                            <div class="campaign">
                                <div class="campaign-name">
                                    Brand Search
                                    <span class="campaign-percent">~10%</span>
                                </div>
                                <ul class="campaign-items">
                                    <li>Exact Brand Name</li>
                                    <li>Brand + Product</li>
                                    <li>Misspellings</li>
                                </ul>
                            </div>

                            <div class="campaign">
                                <div class="campaign-name">
                                    Medium Priority Shopping
                                    <span class="campaign-percent">~20%</span>
                                </div>
                                <ul class="campaign-items">
                                    <li>Best sellers only</li>
                                    <li>Higher bids</li>
                                </ul>
                            </div>

                            <div class="campaign">
                                <div class="campaign-name">
                                    Low Priority Shopping
                                    <span class="campaign-percent">~5%</span>
                                </div>
                                <ul class="campaign-items">
                                    <li>Brand terms in Shopping</li>
                                </ul>
                            </div>

                            <div class="campaign">
                                <div class="campaign-name">
                                    PMax Retargeting
                                    <span class="campaign-percent">~15%</span>
                                </div>
                                <ul class="campaign-items">
                                    <li>Past visitors</li>
                                    <li>Cart abandoners</li>
                                    <li>Best sellers</li>
                                </ul>
                            </div>

                            <div class="examples">
                                <div class="examples-title">Example Searches</div>
                                <ul class="examples-list">
                                    <li>[Brand] discount code</li>
                                    <li>[Brand] blue light glasses</li>
                                    <li>[Brand] vs [Competitor]</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            flowchart.innerHTML = structure;
        }

        // Pan/Zoom functionality
        function updateTransform() {
            flowchart.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        function zoomIn() {
            scale = Math.min(scale + 0.1, 3);
            updateTransform();
        }

        function zoomOut() {
            scale = Math.max(scale - 0.1, 0.3);
            updateTransform();
        }

        function resetView() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        // Mouse drag
        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
            document.body.classList.add('grabbing');
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            document.body.classList.remove('grabbing');
        });

        // Scroll zoom
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            scale = Math.max(0.3, Math.min(3, scale + delta));
            updateTransform();
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === '+' || e.key === '=') zoomIn();
            if (e.key === '-' || e.key === '_') zoomOut();
            if (e.key === '0') resetView();
        });

        // Initialize
        buildFlowchart();
        resetView();
    </script>
</body>
</html>
